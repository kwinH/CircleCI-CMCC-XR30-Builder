name: ImmortalWrt Builder (Optimized mnt)

on:
    repository_dispatch:
    workflow_dispatch:
        inputs:
            APP_MTK:
                description: 'Use luci-app-mtk wifi config'
                required: true
                default: false
                type: boolean
            OPTIMIZATION_LEVEL:
                description: 'Optimization level: basic (LTO+MOLD), full (LTO+MOLD+BPF+CLANG), advanced (all optimizations), custom (manual)'
                required: false
                default: 'full'
                type: choice
                options:
                - 'basic'
                - 'full'
                - 'advanced'
                - 'custom'
            ENABLE_LTO:
                description: '[Custom Mode] Enable Link Time Optimization'
                required: false
                default: true
                type: boolean
            ENABLE_MOLD:
                description: '[Custom Mode] Enable MOLD linker (faster compilation)'
                required: false
                default: true
                type: boolean
            ENABLE_BPF:
                description: '[Custom Mode] Enable extended BPF support'
                required: false
                default: true
                type: boolean
            KERNEL_CLANG_LTO:
                description: '[Custom Mode] Enable Kernel CLANG LTO'
                required: false
                default: true
                type: boolean
            USE_GCC14:
                description: '[Custom Mode] Use GCC 14 for userspace compilation'
                required: false
                default: true
                type: boolean
            ENABLE_ADVANCED_FEATURES:
                description: '[Custom Mode] Enable advanced features (LRNG+DPDK+Local KMOD)'
                required: false
                default: false
                type: boolean
            CUSTOM_LAN_IP:
                description: 'Custom LAN IP address (default: 192.168.3.1, replaces ImmortalWrt default 192.168.6.1)'
                required: false
                default: '192.168.3.1'
                type: string

env:
    TZ: Asia/Shanghai
    REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
    REPO_BRANCH: openwrt-24.10-6.6
    OPENWRT_NAME: padavanonly
    UPLOAD_TAG_NAME: cmcc_xr30
    FEEDS_CONF: feeds.conf.default
    # CONFIG_FILE: .config
    DIY_P1_SH: diy-part1.sh
    DIY_P2_SH: diy-part2-optimized-mnt.sh
    
    # Optimization flags
    OPTIMIZATION_LEVEL: ${{ github.event.inputs.OPTIMIZATION_LEVEL || 'full' }}
    # Individual optimization settings (only used in custom mode)
    ENABLE_LTO: ${{ github.event.inputs.ENABLE_LTO || 'true' }}
    ENABLE_MOLD: ${{ github.event.inputs.ENABLE_MOLD || 'true' }}
    ENABLE_BPF: ${{ github.event.inputs.ENABLE_BPF || 'true' }}
    KERNEL_CLANG_LTO: ${{ github.event.inputs.KERNEL_CLANG_LTO || 'true' }}
    USE_GCC14: ${{ github.event.inputs.USE_GCC14 || 'true' }}
    ENABLE_ADVANCED_FEATURES: ${{ github.event.inputs.ENABLE_ADVANCED_FEATURES || 'false' }}
    CUSTOM_LAN_IP: ${{ github.event.inputs.CUSTOM_LAN_IP || '192.168.3.1' }}

jobs:
    ImmortalWrt-Builder-Optimized:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@main
            
            - name: Check space usage
              if: (!cancelled())
              run: df -hT

            - name: Free disk space (Ubuntu)
              uses: jlumbroso/free-disk-space@main
              with:
                # this might remove tools that are actually needed,
                # if set to "true" but frees about 6 GB
                tool-cache: true

                # all of these default to true, but feel free to set to
                # "false" if necessary for your workflow
                android: true
                dotnet: true
                haskell: true
                large-packages: true
                docker-images: true
                swap-storage: true

            - name: Check space usage
              if: (!cancelled())
              run: df -hT

            - name: Initialization environment
              id: init
              env:
                DEBIAN_FRONTEND: noninteractive
              run: |
                sudo -E apt-get -qq update
                # Install build dependencies including mold
                sudo apt-get install golang-go mold libisl-dev -y
                sudo bash -c 'bash <(curl -s https://build-scripts.immortalwrt.org/init_build_environment.sh)'
                
                # Install additional optimization tools
                if [ "${{ env.USE_GCC14 }}" = "true" ]; then
                  sudo apt-get install gcc-14 g++-14 -y
                  sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 100
                  sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 100
                fi
                
                sudo -E apt-get -qq autoremove --purge
                sudo -E apt-get -qq clean
                sudo timedatectl set-timezone "$TZ"
                sudo mkdir -p /workdir
                sudo chown $USER:$GROUPS /workdir
                
                # Print optimization settings
                echo "🚀 Build Optimization Settings:"
                echo "  ENABLE_LTO: ${{ env.ENABLE_LTO }}"
                echo "  ENABLE_MOLD: ${{ env.ENABLE_MOLD }}"
                echo "  ENABLE_BPF: ${{ env.ENABLE_BPF }}"
                echo "  KERNEL_CLANG_LTO: ${{ env.KERNEL_CLANG_LTO }}"
                echo "  USE_GCC14: ${{ env.USE_GCC14 }}"
                echo "  ENABLE_LRNG: ${{ env.ENABLE_LRNG }}"
                echo "  ENABLE_DPDK: ${{ env.ENABLE_DPDK }}"
                echo "  ENABLE_LOCAL_KMOD: ${{ env.ENABLE_LOCAL_KMOD }}"
                
                echo "status=success" >> $GITHUB_OUTPUT

            - name: Enhanced disk space cleanup
              run: |
                echo "📊 Disk usage before enhanced cleanup:"
                df -hT
                
                # 清理 Docker 相关文件
                docker system prune -af || true
                sudo rm -rf /var/lib/docker || true
                
                # 清理 apt 缓存
                sudo apt-get clean
                sudo rm -rf /var/lib/apt/lists/*
                
                # 清理其他可能的大文件
                sudo rm -rf /opt/hostedtoolcache || true
                sudo rm -rf /usr/share/dotnet || true
                sudo rm -rf /opt/ghc || true
                sudo rm -rf /opt/hostedtoolcache/CodeQL || true
                
                # 清理 npm/yarn 缓存
                sudo rm -rf ~/.npm || true
                sudo rm -rf ~/.cache/yarn || true
                
                echo "📊 Disk usage after enhanced cleanup:"
                df -hT

            - name: Clone source code
              id: clone
              if: steps.init.outcome == 'success' && !cancelled()
              working-directory: /workdir
              run: |
                df -hT $PWD
                git clone -b $REPO_BRANCH --single-branch --depth 1 $REPO_URL openwrt
                ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
                echo "status=success" >> $GITHUB_OUTPUT

            - name: Load custom feeds & execute diy-part1.sh
              id: feeds
              if: steps.clone.outcome == 'success' && !cancelled()
              run: |
                # [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
                chmod +x $DIY_P1_SH
                cd openwrt
                $GITHUB_WORKSPACE/$DIY_P1_SH
                echo "status=success" >> $GITHUB_OUTPUT

            - name: Update & install feeds
              id: feeds-update
              if: steps.feeds.outcome == 'success' && !cancelled()
              run: |
                cd openwrt
                ./scripts/feeds update -a
                ./scripts/feeds install -a
                echo "status=success" >> $GITHUB_OUTPUT

            - name: Move config & execute diy-part2.sh
              id: config
              if: steps.feeds-update.outcome == 'success' && !cancelled()
              run: |
                    cp -f openwrt/defconfig/mt7981-ax3000.config openwrt/.config
                    chmod +x $DIY_P2_SH
                    cd openwrt
                    $GITHUB_WORKSPACE/$DIY_P2_SH
                    echo "status=success" >> $GITHUB_OUTPUT

            - name: config build dir override
              id: update_config_build
              if: steps.feeds-update.outcome == 'success' && !cancelled()
              run: |
                cd openwrt

                # 安全设置构建目录覆盖选项
                if [ -f ".config" ]; then
                    # 检查配置是否已存在（包括被注释的情况）
                    if grep -q "^CONFIG_BUILD_DIR_OVERRIDE=" .config; then
                        # 已启用的配置，直接更新
                        sed -i 's/^CONFIG_BUILD_DIR_OVERRIDE=.*/CONFIG_BUILD_DIR_OVERRIDE="\/mnt\/openwrt_build"/' .config
                        echo "已更新构建目录/mnt/openwrt_build覆盖选项"
                    elif grep -q "# CONFIG_BUILD_DIR_OVERRIDE is not set" .config; then
                        # 被注释的配置，取消注释并设置值
                        sed -i 's/^# CONFIG_BUILD_DIR_OVERRIDE is not set$/CONFIG_BUILD_DIR_OVERRIDE="\/mnt\/openwrt_build"/' .config
                        echo "已启用并更新构建目录/mnt/openwrt_build覆盖选项"
                    else
                        # 配置不存在，添加新配置
                        echo 'CONFIG_BUILD_DIR_OVERRIDE="/mnt/openwrt_build"' >> .config
                        echo "已添加构建目录/mnt/openwrt_build覆盖选项"
                    fi
                else
                    echo "未找到配置文件.config"
                fi

            - name: Use luci-app-mtk config
              if: github.event.inputs.APP_MTK == 'true'
              run: |
                cd openwrt
                sed -i 's/CONFIG_PACKAGE_luci-app-mtwifi-cfg=y/CONFIG_PACKAGE_luci-app-mtk=y/g' .config
                sed -i 's/CONFIG_PACKAGE_luci-i18n-mtwifi-cfg-zh-cn=y/CONFIG_PACKAGE_luci-i18n-mtk-zh-cn=y/g' .config
                sed -i 's/CONFIG_PACKAGE_mtwifi-cfg=y/CONFIG_PACKAGE_wifi-profile=y/g' .config
                sed -i 's/CONFIG_PACKAGE_lua-cjson=y/CONFIG_WIFI_NORMAL_SETTING=y/g' .config
              

                # 1. 关闭内核调试信息（关键！减少临时文件和固件体积）
                sed -i 's/CONFIG_KERNEL_DEBUG_INFO=y/CONFIG_KERNEL_DEBUG_INFO=n/' .config
                sed -i 's/CONFIG_KERNEL_DEBUG_INFO_BTF=y/CONFIG_KERNEL_DEBUG_INFO_BTF=n/' .config
                sed -i 's/CONFIG_KERNEL_DEBUG_INTO_BTF_MODULES=y/CONFIG_KERNEL_DEBUG_INTO_BTF_MODULES=n/' .config
                
                # 2. 关闭开发模式（DEVEL=y 会包含冗余开发工具）
                sed -i 's/CONFIG_DEVEL=y/CONFIG_DEVEL=n/' .config
                
                # 3. 关闭静态库生成（避免双重库文件占用磁盘）
                # 替换已存在的配置，不存在则追加
                sed -i 's/CONFIG_BUILD_STATIC_LIBS=y/CONFIG_BUILD_STATIC_LIBS=n/' .config
                sed -i 's/CONFIG_PACKAGE_libc-static=y/CONFIG_PACKAGE_libc-static=n/' .config
                grep -q "CONFIG_BUILD_STATIC_LIBS=n" .config || echo "CONFIG_BUILD_STATIC_LIBS=n" >> .config
                grep -q "CONFIG_PACKAGE_libc-static=n" .config || echo "CONFIG_PACKAGE_libc-static=n" >> .config
                grep -q "CONFIG_OPENSSL_NO_STATIC=y" .config || echo "CONFIG_OPENSSL_NO_STATIC=y" >> .config
                grep -q "CONFIG_LIBTOOL_DLOPEN=n" .config || echo "CONFIG_LIBTOOL_DLOPEN=n" >> .config
                
                # 4. 关闭内核探针调试（非必需功能，减少编译复杂度）
                sed -i 's/CONFIG_KERNEL_KPROBES=y/CONFIG_KERNEL_KPROBES=n/' .config
                sed -i 's/CONFIG_KERNEL_KPROBE_EVENTS=y/CONFIG_KERNEL_KPROBE_EVENTS=n/' .config
                grep -q "CONFIG_KERNEL_KPROBES=n" .config || echo "CONFIG_KERNEL_KPROBES=n" >> .config
                grep -q "CONFIG_KERNEL_KPROBE_EVENTS=n" .config || echo "CONFIG_KERNEL_KPROBE_EVENTS=n" >> .config
              
                grep -E "CONFIG_KERNEL_DEBUG_INFO|CONFIG_DEVEL|CONFIG_BUILD_STATIC_LIBS|CONFIG_KERNEL_KPROBES" .config
                echo "查看.config内容："
                cat .config

            - name: Download package
              id: package
              if: steps.config.outcome == 'success' && !cancelled()
              run: |
                cd openwrt
                make defconfig
                
                # Use optimized parallel download
                CORES=$(nproc)
                JOBS=$((CORES + 1))
                echo "🚀 Using ${JOBS} parallel jobs for download (${CORES} cores detected)"
                make download -j${JOBS}
                find dl -size -1024c -exec ls -l {} \;
                find dl -size -1024c -exec rm -f {} \;
               
                # 检查下载目录大小
                echo "📦 Download directory size:"
                du -sh dl/
                
                # 清理构建目录中可能存在的临时文件
                find build_dir -name "*.o" -delete 2>/dev/null || true
                find build_dir -name "*.a" -delete 2>/dev/null || true

            - name: Cache ccache
              uses: actions/cache@v4
              with:
                path: /mnt/.openwrt_ccache
                key: ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-${{ github.sha }}
                # 如果找不到完全匹配的 sha，回退使用最近的缓存
                restore-keys: |
                  ${{ runner.os }}-openwrt-ccache-${{ env.REPO_BRANCH }}-

            - name: Check space before compilation
              run: |    
                echo "🔍 Disk usage before compilation:"
                df -hT
                echo "📁 Free space in workdir:"
                du -sh /workdir || true
                echo "📦 Free space in openwrt directory:"
                du -sh /workdir/openwrt || true 

            - name: Clean old build artifacts
              run: |
                cd openwrt
                make dirclean || true
                # 清理残留的中间文件和静态库
                rm -rf build_dir/target-*/*/.libs build_dir/target-*/*/*.a 2>/dev/null || true
                rm -rf staging_dir/target-*/*/lib/*.a 2>/dev/null || true

            - name: Compile the firmware
              id: compile
              run: |
                cd openwrt
                echo "DEBUG: HOST_CFLAGS is $HOST_CFLAGS"
                CORES=$(nproc)
                #JOBS=$((CORES + 1))
                JOBS=1
                
                echo "🚀 Starting optimized compilation with ${JOBS} parallel jobs"
                echo "Build optimizations enabled:"
                echo "  - LTO: ${{ env.ENABLE_LTO }}"
                echo "  - MOLD: ${{ env.ENABLE_MOLD }}"
                echo "  - BPF: ${{ env.ENABLE_BPF }}"
                echo "  - Kernel CLANG LTO: ${{ env.KERNEL_CLANG_LTO }}"
                echo "  - GCC14: ${{ env.USE_GCC14 }}"
                echo "  - LRNG: ${{ env.ENABLE_LRNG }}"
                echo "  - DPDK: ${{ env.ENABLE_DPDK }}"
                echo "  - Local KMOD: ${{ env.ENABLE_LOCAL_KMOD }}"
                
                # Record build start time
                BUILD_START=$(date +%s)
                
                # 定期检查磁盘空间的后台任务
                (
                  while pgrep -f "make.*-j" > /dev/null; do
                    sleep 60  # 每1分钟检查一次
                    echo "🔍 Disk usage during compilation (timestamp: $(date)):"
                    df -hT | grep -E '(/dev/root|/mnt)'  # 显示磁盘整体使用率
                    usage=$(df / | tail -1 | awk '{print $5}' | sed 's/%//')
                    
                    if [ "$usage" -gt 80 ]; then
                      echo "⚠️ Disk usage >80%! Searching for large directories (top 10)..."
                      # 查找编译核心目录下最大的10个目录（按大小排序，显示人类可读格式）
                      sudo du -h --max-depth=1 /workdir/openwrt 2>/dev/null | sort -hr | head -10
                      echo "💾 Top 10 largest directories listed above. Starting cleanup..."
                      
                      # 原有清理逻辑保留，新增清理大目录下的冗余文件
                      # 1. 清理LTO临时文件、目标文件、静态库
                      find /workdir/openwrt/build_dir -name "*.ir" -o -name "*.o" -o -name "*.a" -o -name ".libs" -exec rm -rf {} + 2>/dev/null || true
                      # 2. 清理过期下载包（dl目录下1天前的文件）
                      find /workdir/openwrt/dl -type f -mtime +1 -exec rm -f {} + 2>/dev/null || true
                      # 3. 清理ccache过期缓存
                      ccache -c 2>/dev/null || true
                      # 4. 清理staging_dir下的冗余头文件和库文件
                      rm -rf /workdir/openwrt/staging_dir/target-*/*/lib/*.a 2>/dev/null || true
                      rm -rf /workdir/openwrt/staging_dir/toolchain-*/*/include/* 2>/dev/null || true
                
                      rm -rf /workdir/openwrt/*.log
                      # 删除openwrt根目录的.git目录
                      rm -rf /workdir/data/openwrt/.git
                      # 若feeds目录也有.git，可一并删除（仅释放少量空间）
                      rm -rf /workdir/data/openwrt/feeds/*/.git                
                      
                      echo "✅ Cleanup completed. Updated disk usage:"
                      df -hT | grep -E '(/dev/root|/mnt)'
                    fi
                  done
                ) &     
                
                sudo mkdir -p /mnt/openwrt_build
                
                # Optimized build process
                # make -j${JOBS} V=s || make -j1 || make -j1 V=s
                make -j${JOBS} 2> >(tee build-error.log) >/dev/null || make -j1 2> >(tee -a build-error.log) >/dev/null || make -j1 V=s 2> >(tee -a build-error.log) >/dev/null
                
                if [ -s build-error.log ]; then
                  echo "❌ 编译失败，错误日志已保存到 build-error.log"
                  cat build-error.log
                else
                  echo "✅ 编译成功，无错误输出"
                  rm -f build-error.log  # 成功则删除空日志文件
                fi                
                
                # Calculate build time
                BUILD_END=$(date +%s)
                BUILD_TIME=$((BUILD_END - BUILD_START))
                BUILD_MINUTES=$((BUILD_TIME / 60))
                BUILD_SECONDS=$((BUILD_TIME % 60))
                echo "⏱️ Build completed in ${BUILD_MINUTES}m ${BUILD_SECONDS}s"
                
                if grep -q 'CONFIG_PACKAGE_mtwifi-cfg=y' .config; then
                        echo "WIFI_INTERFACE=-mtwifi" >> $GITHUB_ENV
                else
                echo "WIFI_INTERFACE=" >> $GITHUB_ENV
                fi
                echo "COMPILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV
                echo "status=success" >> $GITHUB_OUTPUT

            # ==============================================
            # 核心新增：编译失败后执行磁盘空间检查 + 日志收集
            # ==============================================
            - name: Collect debug info on failure (Disk Space + Logs)
              id: collect-debug
              if: failure()  # 只有前面步骤失败时才执行
              run: |
                echo "=============================================="
                echo "❌ Build failed! Collecting debug information..."
                echo "=============================================="
                
                # 1. 检查磁盘空间（关键：排查磁盘不足问题）
                echo "📊 Disk Space Usage:"
                df -hT
                echo ""
                
                # 2. 检查内存和交换空间（关键：排查OOM问题）
                echo "📊 Memory & Swap Usage:"
                free -h
                echo ""

                # 编译器信息
                echo "🔍 Compiler Info:"
                gcc --version
                cc --version
                which gcc
                which cc
                echo ""          
                
                # 3. 检查当前工作目录权限（修复：先判断目录是否存在）
                echo "🔍 Work Directory Permissions:"
                if [ -d "/workdir" ]; then
                  ls -la /workdir
                else
                  echo "⚠️ /workdir does not exist (initialization step failed)"
                fi
                echo ""
                
                # 4. 创建日志目录
                mkdir -p $GITHUB_WORKSPACE/debug-logs
                
                # 5. 收集 m4 工具的 config.log（关键：排查 tools/m4 编译失败）
                echo "📄 Collecting m4 config.log..."
                if [ -d "/workdir/openwrt" ]; then
                  M4_CONFIG_LOG=$(find /workdir/openwrt/build_dir/host/m4-* -name config.log 2>/dev/null | head -1)
                  if [ -f "$M4_CONFIG_LOG" ]; then
                    cp "$M4_CONFIG_LOG" $GITHUB_WORKSPACE/debug-logs/m4-config.log
                    echo "✅ m4 config.log collected"
                  else
                    echo "⚠️ m4 config.log not found"
                    echo "m4 config.log not found" > $GITHUB_WORKSPACE/debug-logs/m4-config.log
                  fi
                else
                  echo "⚠️ /workdir/openwrt does not exist (clone step failed)"
                  echo "m4 config.log not available (source code not cloned)" > $GITHUB_WORKSPACE/debug-logs/m4-config.log
                fi
                
                # 6. 收集编译过程中的关键日志（如果存在）
                echo "📄 Collecting build logs..."
                if [ -d "/workdir/openwrt" ]; then
                  find /workdir/openwrt -name "*.log" -type f -size -10M | head -10 | xargs -I {} cp {} $GITHUB_WORKSPACE/debug-logs/ 2>/dev/null || true
                else
                  echo "⚠️ No build logs available (source code not cloned)"
                fi
                
                # 7. 收集 .config 文件（排查配置错误）
                echo "📄 Collecting .config file..."
                if [ -f "/workdir/openwrt/.config" ]; then
                  cp /workdir/openwrt/.config $GITHUB_WORKSPACE/debug-logs/.config
                else
                  echo "⚠️ .config file not found (config step failed)"
                  echo ".config file not available" > $GITHUB_WORKSPACE/debug-logs/.config
                fi
                
                # 8. 收集磁盘空间和内存使用情况的日志
                echo "📄 Saving system info to log..."
                df -hT > $GITHUB_WORKSPACE/debug-logs/disk-space.log
                free -h > $GITHUB_WORKSPACE/debug-logs/memory.log
                
                # 9. 列出收集到的日志文件
                echo "📋 Collected debug logs:"
                ls -la $GITHUB_WORKSPACE/debug-logs
                echo ""
                          
                echo "✅ Debug information collection completed"

            # 核心新增：上传调试日志到 Artifacts（失败后可下载）
            - name: Upload debug logs on failure
              if: failure() && steps.collect-debug.outcome == 'success'
              uses: actions/upload-artifact@main
              with:
                name: debug-logs-${{ github.run_id }}
                path: $GITHUB_WORKSPACE/debug-logs/
                retention-days: 7  # 日志保留7天

            - name: Check space usage
              if: (!cancelled())
              run: df -hT

            - name: Organize compiled firmware
              if: steps.compile.outcome == 'success' && !cancelled()
              run: |
                mapfile -t devices < <(grep '^CONFIG_TARGET_DEVICE.*=y' openwrt/.config | sed -r 's/.*DEVICE_(.*)=y/\1/')
                cd openwrt/bin/targets/*/*
                
                echo "📋 检查构建结果..."
                echo "生成的所有文件："
                ls -la
                echo ""
                
                echo "查找 CMCC XR30 相关文件："
                find . -name "*cmcc*" -o -name "*xr30*" || echo "⚠️ 未找到 CMCC XR30 文件"
                echo ""
                
                # Check if XR30 firmware was generated
                if ! find . -name "*cmcc_xr30*sysupgrade.bin" | grep -q .; then
                    echo "❌ 警告：未找到 CMCC XR30 升级固件"
                    echo "📋 所有生成的 .bin 文件："
                    find . -name "*.bin" | head -10
                    echo ""
                fi
                
                rm -rf packages
                sudo -E apt-get -qq install rename
                for val in "${devices[@]}"; do
                    rename "s/.*${val}/${{ env.COMPILE_DATE }}-${{ env.OPENWRT_NAME }}-${val}${{ env.WIFI_INTERFACE }}/" *
                    echo "$val"
                done
                echo "FIRMWARE=$PWD" >> $GITHUB_ENV
                echo "status=success" >> $GITHUB_OUTPUT

            - name: Upload firmware to Artifacts
              # if: steps.organize.outcome == 'success' && !cancelled()
              uses: actions/upload-artifact@main
              with:
                name: ${{ env.COMPILE_DATE }}-${{ env.OPENWRT_NAME }}-${{ env.UPLOAD_TAG_NAME }}${{ env.WIFI_INTERFACE }}
                path: |
                  /workdir/openwrt/bin/targets/*/*/*.bin
                  /workdir/openwrt/bin/targets/*/*/*.manifest
                  /workdir/openwrt/bin/targets/*/*/sha256sums
                  /workdir/openwrt/bin/targets/*/*/*buildinfo
